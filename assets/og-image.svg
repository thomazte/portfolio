<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0b"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Badge -->
  <g transform="translate(100,150)">
    <rect width="320" height="44" rx="22" fill="#141418" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="26" cy="22" r="5" fill="#34d399"/>
    <text x="44" y="28" font-family="Inter, sans-serif" font-size="17" fill="#a1a1aa">Desenvolvedor em formação</text>
  </g>

  <!-- Nome -->
  <text x="100" y="300" font-family="'Space Grotesk', sans-serif" font-size="92" font-weight="700" fill="#f4f4f5" letter-spacing="-2">Thomaz Arthur</text>

  <!-- Título -->
  <text x="100" y="370" font-family="'Space Grotesk', sans-serif" font-size="42" font-weight="500" fill="#a1a1aa">
    Analista de Suporte · <tspan fill="#60a5fa">SQL Server</tspan>
  </text>

  <!-- Stack -->
  <g font-family="'JetBrains Mono', monospace" font-size="20" fill="#71717a">
    <text x="100" y="470">Java · Spring Boot · Python · JavaScript · Git</text>
  </g>

  <!-- Logo -->
  <text x="100" y="560" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700" fill="#f4f4f5">
    zamoht<tspan fill="#60a5fa">.exe</tspan>
  </text>

  <!-- Code brackets decorativos -->
  <g transform="translate(960,260)" fill="none" stroke="url(#accent)" stroke-opacity="0.6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0 0 -60 60 0 120"/>
    <polyline points="120 0 180 60 120 120"/>
    <line x1="86" y1="-15" x2="34" y2="135" stroke="#93c5fd" stroke-opacity="0.6" stroke-width="8"/>
  </g>
</svg>
